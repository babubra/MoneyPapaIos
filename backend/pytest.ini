[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
pythonpath = .
markers =
    golden: tests that hit the real aitunnel.ru endpoint (require AITUNNEL_API_KEY, cost real tokens)
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:jose.*
