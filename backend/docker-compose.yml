services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: monpapa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monpapa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monpapa_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-monpapa}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monpapa}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build: .
    container_name: monpapa-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      # Dev: монтируем код для hot-reload
      - .:/app
    env_file:
      - .env
    environment:
      # В Docker backend подключается к сервису 'db', а не localhost
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-monpapa}:${POSTGRES_PASSWORD:-monpapa_dev_secret}@db:5432/${POSTGRES_DB:-monpapa}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  pgdata:
